<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>予定追加</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="app">

  <section class="card">
    <h2>予定追加</h2>

    <form class="form-grid" action="/add" method="post">

      <div>
        <label>開始日</label>
        <input type="date" name="start_date" value="{{ selected_date }}" required>
      </div>

      <div>
        <label>終了日</label>
        <input type="date" name="end_date" value="{{ selected_date }}">
      </div>

      <div>
        <label>タイトル</label>
        <input name="title" required>
      </div>

      <div>
        <label>タグ</label>
        <select name="tag">
          {% for tag in tags %}
          <option>{{ tag }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label>誰の予定？</label>
        <div class="owner-buttons">

          <input type="radio" id="m" name="owner" value="まき" checked>
          <label for="m" class="owner-label maki">まき</label>

          <input type="radio" id="r" name="owner" value="亮太">
          <label for="r" class="owner-label ryota">亮太</label>

          <input type="radio" id="b" name="owner" value="二人">
          <label for="b" class="owner-label both">二人</label>

        </div>
      </div>

      <div>
        <label>場所</label>
        <input name="location">
      </div>

      <div>
        <label>メモ</label>
        <textarea name="memo"></textarea>
      </div>

      <div>
        <label>URL</label>
        <input name="url">
      </div>

      <button class="btn">追加</button>

    </form>
  </section>

</div>
</body>
</html>
