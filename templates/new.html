<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>予定追加</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon.png">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="app">

  <section class="card">
    <h1 class="section-title">予定追加</h1>

    <form class="form-grid" action="/add" method="post">
      <div>
        <label>開始日</label>
        <input type="date" name="start_date" value="{{ selected_date }}" required>
      </div>

      <div>
        <label>終了日</label>
        <input type="date" name="end_date" value="{{ selected_date }}">
      </div>

      <div>
        <label>誰の予定？</label>
        <div class="owner-buttons">
          <input class="owner-radio" type="radio" id="owner_maki_new" name="owner" value="まき" checked>
          <label class="owner-label maki" for="owner_maki_new">まき</label>

          <input class="owner-radio" type="radio" id="owner_ryota_new" name="owner" value="亮太">
          <label class="owner-label ryota" for="owner_ryota_new">亮太</label>

          <input class="owner-radio" type="radio" id="owner_both_new" name="owner" value="二人">
          <label class="owner-label both" for="owner_both_new">二人</label>
        </div>
      </div>

      <div>
        <label>タイトル</label>
        <input name="title" required>
      </div>

      <div>
        <label>タグ</label>
        <select name="tag">
          {% for tag in tags %}
            <option value="{{ tag }}">{{ tag }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label>開始時間</label>
        <div class="time-row">
          <select name="start_hour">
            <option value="">--</option>
            {% for h in hours %}
              <option value="{{ h }}">{{ h }}</option>
            {% endfor %}
          </select>
          <span>時</span>

          <select name="start_minute">
            <option value="">--</option>
            {% for m in minutes %}
              <option value="{{ m }}">{{ m }}</option>
            {% endfor %}
          </select>
          <span>分</span>
        </div>
      </div>

      <div>
        <label>終了時間</label>
        <div class="time-row">
          <select name="end_hour">
            <option value="">--</option>
            {% for h in hours %}
              <option value="{{ h }}">{{ h }}</option>
            {% endfor %}
          </select>
          <span>時</span>

          <select name="end_minute">
            <option value="">--</option>
            {% for m in minutes %}
              <option value="{{ m }}">{{ m }}</option>
            {% endfor %}
          </select>
          <span>分</span>
        </div>
      </div>

      <div>
        <label>場所</label>
        <input name="location">
      </div>

      <div>
        <label>メモ</label>
        <textarea name="memo"></textarea>
      </div>

      <div>
        <label>URL</label>
        <input name="url">
      </div>

      <button class="btn" type="submit">追加</button>
    </form>

    <a class="back" href="/calendar">戻る</a>
  </section>

</div>
</body>
</html>
